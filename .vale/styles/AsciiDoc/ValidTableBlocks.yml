---
extends: script
ignorecase: true
level: error
message: "AsciiDoc file contains one or more unterminated table blocks."
link: https://docs.asciidoctor.org/asciidoc/latest/tables/build-a-basic-table/
scope: raw
script: |
  text := import("text")

  matches := []
  tbl_delim_regex := "\\|={3,}"
  body_regex := "^[^\\.\\|\\[].*$"
  open_tbl := false

  for line in text.split(scope, "\n") {
    if text.re_match(tbl_delim_regex, line) && open_tbl == false {
      //start of table
      open_tbl = true    
      start := text.index(scope, line)
      matches = append(matches, {begin: start, end: start + len(line)})
    } else if text.re_match(tbl_delim_regex, line) && open_tbl == true {
      //end of table
      open_tbl = false
      if len(matches) > 0 {
        //remove the most recently added match
        matches = matches[:len(matches)-1]
      }
    } else if text.re_match(body_regex, line) {
      //end of table
      open_tbl = false
    }
  }
